<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Online: Final Hope</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #001a00; font-family: 'Courier New', monospace; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0, 30, 0, 0.9); padding: 15px; border: 2px solid #0f0; color: #0f0; border-radius: 8px; }
        #id-display { color: #fff; background: #050; padding: 2px 5px; border-radius: 3px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 140px; margin: 10px 0; }
        button { background: #0f0; border: none; color: #000; padding: 10px; width: 100%; font-weight: bold; }
        #log { font-size: 10px; color: #0f0; margin-top: 10px; height: 30px; overflow: hidden; }
        #joystick-zone { position: absolute; bottom: 50px; right: 50px; width: 120px; height: 120px; background: rgba(0,255,0,0.1); border-radius: 50%; border: 2px solid #0f0; }
        #stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #0f0; border-radius: 50%; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <div>ID: <span id="id-display">СЕТЬ...</span></div>
    <input type="text" id="peer-id" placeholder="ID ДРУГА">
    <button onclick="connect()">ПОДКЛЮЧИТЬСЯ</button>
    <div id="log">Инициализация...</div>
</div>

<div id="joystick-zone"><div id="stick"></div></div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const idShow = document.getElementById('id-display');
    const log = document.getElementById('log');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let myPos = { x: canvas.width/2, y: canvas.height/2 };
    let players = {};
    let myId = 'duck-' + Math.floor(Math.random() * 8999 + 1000);

    // КОНФИГ ДЛЯ ОБХОДА БЛОКИРОВОК 4G
    const peer = new Peer(myId, {
        host: '0.peerjs.com', // Пробуем напрямую
        port: 443,
        secure: true,
        pingInterval: 3000,
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        }
    });

    peer.on('open', id => {
        idShow.innerText = id;
        log.innerText = "ГОТОВ К ИГРЕ";
        players[id] = { x: myPos.x, y: myPos.y, color: '#0f0' };
    });

    peer.on('error', (err) => {
        log.innerText = "Сбой: " + err.type;
        if(err.type === 'network') {
            log.innerText = "Сеть 4G блокирует связь. Пробую обход...";
            // Если через 5 сек не заработало, пробуем переподключиться
            setTimeout(() => location.reload(), 5000);
        }
    });

    peer.on('connection', c => setup(c));

    function connect() {
        const friend = document.getElementById('peer-id').value;
        if(friend) {
            log.innerText = "Ищу друга...";
            setup(peer.connect(friend));
        }
    }

    function setup(conn) {
        conn.on('open', () => {
            log.innerText = "ЕСТЬ КОНТАКТ!";
            setInterval(() => {
                conn.send({ id: myId, x: myPos.x, y: myPos.y });
            }, 50);
        });
        conn.on('data', data => {
            players[data.id] = { x: data.x, y: data.y, color: '#ffea00' };
        });
    }

    // ДЖОЙСТИК (УПРОЩЕННЫЙ ДЛЯ ТЕЛЕФОНА)
    const zone = document.getElementById('joystick-zone');
    const stick = document.getElementById('stick');
    let move = { x: 0, y: 0 };

    zone.addEventListener('touchstart', e => handle(e));
    zone.addEventListener('touchmove', e => { e.preventDefault(); handle(e); });
    zone.addEventListener('touchend', () => {
        stick.style.transform = 'translate(0,0)';
        move = { x: 0, y: 0 };
    });

    function handle(e) {
        const r = zone.getBoundingClientRect();
        const cx = r.left + r.width/2, cy = r.top + r.height/2;
        const t = e.touches[0];
        let dx = t.clientX - cx, dy = t.clientY - cy;
        const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
        const ang = Math.atan2(dy, dx);
        dx = Math.cos(ang) * d; dy = Math.sin(ang) * d;
        stick.style.transform = `translate(${dx}px,${dy}px)`;
        move = { x: dx/7, y: dy/7 };
    }

    function draw() {
        ctx.fillStyle = '#001a00';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        
        myPos.x += move.x; myPos.y += move.y;
        if (players[myId]) { players[myId].x = myPos.x; players[myId].y = myPos.y; }

        for(let id in players) {
            const p = players[id];
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, 7); ctx.fill();
            ctx.fillStyle = '#f60'; // Клюв
            ctx.fillRect(p.x+12, p.y-5, 12, 10);
            ctx.fillStyle = '#0f0';
            ctx.fillText(id === myId ? "Я" : "ДРУГ", p.x-15, p.y-25);
        }
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
